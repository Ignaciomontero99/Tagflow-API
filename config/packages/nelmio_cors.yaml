nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['^http://localhost:5173$']
        allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With']
        expose_headers: ['Authorization']
        max_age: 3600
    paths:
        '^/tagflow/':
            origin_regex: true
            allow_origin: ['^http://localhost:5173$']
            allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
            allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With']
            expose_headers: ['Authorization']
            max_age: 3600