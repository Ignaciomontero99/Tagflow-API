  controller: App\Controller\PostController::commentsPost
  methods: [GET, POST]
  requirements:
    id_post: '\d+'

posts_options:
  path: /tagflow/posts/{id_post}
  controller: App\Controller\PostController::postsOptions
  methods: [GET, PATCH, DELETE]
  requirements:
    id_post: '\d+'


