# =========================
# AUTH
# =========================

register:
  path: /tagflow/auth/register
  controller: App\Controller\AuthController::register
  methods: [POST]

login:
  path: /tagflow/auth/login
  controller: App\Controller\AuthController::login
  methods: [POST]

refresh:
  path: /tagflow/auth/refresh
  controller: App\Controller\AuthController::refresh
  methods: [POST]

me:
  path: /tagflow/auth/me
  controller: App\Controller\AuthController::me
  methods: [GET]

logout:
  path: /tagflow/auth/logout
  controller: App\Controller\AuthController::logout
  methods: [POST]

logout_all:
  path: /tagflow/auth/logout-all
  controller: App\Controller\AuthController::logoutAll
  methods: [POST]

forgot_password:
  path: /tagflow/auth/forgot-password
  controller: App\Controller\AuthController::forgotPassword
  methods: [POST]

reset_password:
  path: /tagflow/auth/reset-password
  controller: App\Controller\AuthController::resetPassword
  methods: [POST]

delete_account:
  path: /tagflow/auth/delete-account
  controller: App\Controller\AuthController::deleteAccount
  methods: [DELETE]


# =========================
# USERS
# =========================

users_interests:
  path: /tagflow/users/me/interests
  controller: App\Controller\UserController::interests
  methods: [GET, PUT, PATCH]

users_update_profile:
  path: /tagflow/users/me
  controller: App\Controller\UserController::updateProfile
  methods: [PATCH]

users_followers:
  path: /tagflow/users/{id_user}/followers
  controller: App\Controller\UserController::followers
  methods: [GET]
  requirements:
    id_user: '\d+'

users_following:
  path: /tagflow/users/{id_user}/following
  controller: App\Controller\UserController::following
  methods: [GET]
  requirements:
    id_user: '\d+'

users_follow:
  path: /tagflow/users/{id_user}/follow
  controller: App\Controller\UserController::follow
  methods: [POST, DELETE]
  requirements:
    id_user: '\d+'

users_block:
  path: /tagflow/users/{id_user}/block
  controller: App\Controller\UserController::block
  methods: [POST, DELETE]
  requirements:
    id_user: '\d+'

users_profile:
  path: /tagflow/users/{id_user}
  controller: App\Controller\UserController::perfilUser
  methods: [GET]
  requirements:
    id_user: '\d+'

users_posts:
  path: /tagflow/users/{id_user}/posts
  controller: App\Controller\UserController::postsUser
  methods: [GET]
  requirements:
    id_user: '\d+'

user_password_change:
  path: /tagflow/users/me/password
  controller: App\Controller\UserController::passwordChange
  methods: [PATCH]

users_tag_list:
  path: /tagflow/users/tags
  controller: App\Controller\UserController::tagList
  methods: [GET]
  requirements:
    id_user: '\d+'


